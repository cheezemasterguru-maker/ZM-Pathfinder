<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Pathfinder</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0b1020;
  color: white;
  text-align: center;
}

.logo {
  width: 100%;
  max-width: 500px;
}

h1 { margin: 10px 0; }

.tools {
  position: sticky;
  top: 0;
  background: #0b1020;
  padding: 10px;
  z-index: 10;
}

button {
  margin: 4px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

.number { background:#fff; color:#000; }
.block { background:#000; color:#fff; }
.bubble { background:#7dd3fc; }
.shaft { background:#7CFC00; }
.empty { background:#ccc; }

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  max-width: 500px;
  margin: auto;
  gap: 2px;
}

.cell {
  background: #f0f0f0;
  color: #111;
  aspect-ratio: 1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  outline: none;
}

.cell.block { background:#000; color:#fff; }
.cell.bubble { background:#7dd3fc; color:#000; }
.cell.shaft { background:#7CFC00; color:#000; }

/* paste box */
.paste-box {
  width: 90%;
  max-width: 500px;
  height: 80px;
  margin: 10px auto;
  border-radius: 10px;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo">
<h1>ZM Pathfinder</h1>

<div class="tools">
  <button class="number" onclick="setTool('number')">Number</button>
  <button class="block" onclick="setTool('block')">Block</button>
  <button class="bubble" onclick="setTool('bubble')">Bubble</button>
  <button class="shaft" onclick="setTool('shaft')">Shaft 2x3</button>
  <button class="empty" onclick="setTool('empty')">Empty</button>
</div>

<!-- MOBILE SAFE PASTE -->
<textarea id="pasteBox" class="paste-box" placeholder="Paste from Sheets here if direct paste doesn’t work"></textarea>
<br>
<button onclick="applyPaste()">Paste Into Grid</button>

<div id="grid" class="grid"></div>

<script>
const ROWS = 20;
const COLS = 7;

let grid = [];
let tool = "number";

// INIT GRID
function init() {
  const g = document.getElementById("grid");
  g.innerHTML = "";
  grid = [];

  for (let r=0;r<ROWS;r++){
    grid[r]=[];
    for (let c=0;c<COLS;c++){
      grid[r][c]="";

      const d = document.createElement("div");
      d.className="cell";
      d.contentEditable=true;
      d.dataset.r=r;
      d.dataset.c=c;

      d.addEventListener("input", handleTyping);
      d.addEventListener("paste", handlePaste);
      d.addEventListener("click", ()=>handleClick(r,c));

      g.appendChild(d);
    }
  }
}

function setTool(t){ tool=t; }

// CLICK
function handleClick(r,c){
  if(tool==="number") return;

  if(tool==="block"){
    grid[r][c] = grid[r][c]==="X" ? "" : "X";
  }

  else if(tool==="bubble"){
    grid[r][c] = grid[r][c]==="B" ? "" : "B";
  }

  else if(tool==="empty"){
    grid[r][c]="";
  }

  else if(tool==="shaft"){
    let removing = grid[r][c]==="S";

    for(let dr=0;dr<3;dr++){
      for(let dc=0;dc<2;dc++){
        if(grid[r+dr] && grid[r+dr][c+dc]!==undefined){
          grid[r+dr][c+dc] = removing ? "" : "S";
        }
      }
    }
  }

  render();
}

// TYPING
function handleTyping(e){
  const el = e.target;
  const r = el.dataset.r;
  const c = el.dataset.c;

  let val = el.innerText.trim();

  if(val===""){
    grid[r][c]="";
  }
  else if(!isNaN(val)){
    grid[r][c]=Number(val);
  }
  else{
    el.innerText = grid[r][c] || "";
  }

  render();
}

// DIRECT PASTE (may fail on mobile)
function handlePaste(e){
  try {
    const text = e.clipboardData.getData("text");
    applyText(text, e.target);
  } catch {}
}

// FALLBACK PASTE
function applyPaste(){
  const text = document.getElementById("pasteBox").value;
  applyText(text);
}

// CORE PASTE LOGIC
function applyText(text, startCell){
  if(!text) return;

  const rows = text.trim().split("\n");

  let startR = 0;
  let startC = 0;

  if(startCell){
    startR = Number(startCell.dataset.r);
    startC = Number(startCell.dataset.c);
  }

  rows.forEach((row,ri)=>{
    const cols = row.split(/\t|,/);

    cols.forEach((val,ci)=>{
      const r = startR+ri;
      const c = startC+ci;

      if(grid[r] && grid[r][c]!==undefined){
        val = val.trim();

        if(!val) return;

        if(!isNaN(val)) grid[r][c]=Number(val);
        else if(val.toUpperCase()==="X") grid[r][c]="X";
        else if(val.toUpperCase()==="B") grid[r][c]="B";
      }
    });
  });

  render();
}

// RENDER
function render(){
  document.querySelectorAll(".cell").forEach(cell=>{
    const r = cell.dataset.r;
    const c = cell.dataset.c;
    const val = grid[r][c];

    cell.className="cell";
    cell.innerText="";

    if(val==="X"){
      cell.classList.add("block");
    }
    else if(val==="B"){
      cell.classList.add("bubble");
      cell.innerText="B";
    }
    else if(val==="S"){
      cell.classList.add("shaft");
      cell.innerText="S";
    }
    else if(val!==""){
      cell.innerText=val;
    }
  });
}

init();
</script>

</body>
</html>
