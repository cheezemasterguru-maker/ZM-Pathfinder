<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Pathfinder</title>

<style>
  body{
    margin:0;
    background:#0b1020;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
  }

  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:8px 10px 20px;
  }

  .logo{
    width:100%;
    max-width:360px;
    display:block;
    margin:0 auto 4px;
  }

  h1{
    margin:2px 0 10px;
    font-size:28px;
    font-weight:800;
  }

  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    background:#0b1020;
    padding:6px 0 8px;
  }

  .gate-select{
    width:100%;
    max-width:520px;
    margin:0 auto 8px;
    display:block;
    font-size:14px;
    font-weight:700;
    padding:8px 10px;
    border:none;
    border-radius:12px;
    background:#f1f1f1;
    color:#111;
  }

  .tool-row,
  .action-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:8px 0;
  }

  button{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:14px;
    font-weight:800;
    min-width:110px;
  }

  .number{background:#fff;color:#111;}
  .block{background:#000;color:#fff;border:1px solid #444;}
  .bubble{background:#8fd3f7;color:#111;}
  .shaft{background:#98f44d;color:#111;}
  .empty{background:#d9d9d9;color:#111;}
  .action{background:#28345f;color:#fff;}

  .hint{
    color:#c9d2f3;
    font-size:12px;
    line-height:1.3;
    margin:8px auto 12px;
    max-width:620px;
  }

  .report{
    max-width:620px;
    margin:0 auto 12px;
    background:#131a30;
    border:1px solid #2a355f;
    border-radius:12px;
    padding:12px;
    text-align:left;
    white-space:pre-wrap;
    font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:14px;
  }

  .grid-wrap{
    overflow:auto;
    padding-bottom:6px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:2px;
    max-width:520px;
    margin:0 auto;
    background:#0b1020;
  }

  .cell{
    background:#efefef;
    color:#111;
    min-height:52px;
    aspect-ratio:1 / 1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:800;
    user-select:none;
    -webkit-user-select:none;
    border:none;
    outline:none;
  }

  .cell.selected{
    box-shadow:inset 0 0 0 3px #f59e0b;
  }

  .cell.block{
    background:#000;
    color:#fff;
  }

  .cell.bubble{
    background:#8fd3f7;
    color:#111;
  }

  .cell.shaft{
    background:#98f44d;
    color:#111;
  }
</style>
</head>
<body>
<div class="wrap">

  <img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo" alt="Logo">
  <h1>ZM Pathfinder</h1>

  <div class="topbar">
    <select id="gateType" class="gate-select">
      <option value="standard">Standard — 5 attack points</option>
      <option value="end">End — 3 attack points</option>
    </select>

    <div class="tool-row">
      <button class="number" onclick="setTool('number')">Number</button>
      <button class="block" onclick="setTool('block')">Block</button>
      <button class="bubble" onclick="setTool('bubble')">Bubble</button>
      <button class="shaft" onclick="setTool('shaft')">Shaft 2x3</button>
      <button class="empty" onclick="setTool('empty')">Empty</button>
    </div>

    <div class="action-row">
      <button class="action" onclick="pasteFromClipboard()">📋 Paste From Clipboard</button>
      <button class="action" onclick="copyGridText()">Copy Grid Text</button>
      <button class="action" onclick="clearBoard()">Clear Board</button>
      <button class="action" onclick="loadSampleGate1()">Sample Gate 1</button>
    </div>
  </div>

  <div class="hint">
    Tap a cell to choose the paste start. Number tool prompts for manual entry.
    Tap Block, Bubble, or Shaft again to remove them.
  </div>

  <div id="report" class="report">Grid editor restored. Paste should start from the last cell you tapped.</div>

  <div class="grid-wrap">
    <div id="grid" class="grid"></div>
  </div>

</div>

<script>
const ROWS = 20;
const COLS = 7;

let grid = [];
let tool = "number";
let lastSelected = { r: 0, c: 0 };

function setReport(msg){
  document.getElementById("report").textContent = msg;
}

function init(){
  const g = document.getElementById("grid");
  g.innerHTML = "";
  grid = [];

  for(let r=0;r<ROWS;r++){
    grid[r] = [];
    for(let c=0;c<COLS;c++){
      grid[r][c] = "";

      const d = document.createElement("div");
      d.className = "cell";
      d.dataset.r = r;
      d.dataset.c = c;
      d.onclick = () => clickCell(r,c);

      g.appendChild(d);
    }
  }

  render();
}

function setTool(t){
  tool = t;
}

function clickCell(r,c){
  lastSelected = { r, c };

  if(tool === "number"){
    const current = typeof grid[r][c] === "number" ? String(grid[r][c]) : "";
    const val = prompt("Enter number (blank clears):", current);
    if(val === null){
      render();
      return;
    }
    const trimmed = val.trim();
    if(trimmed === ""){
      grid[r][c] = "";
    } else if(!isNaN(trimmed) && Number(trimmed) > 0){
      grid[r][c] = Number(trimmed);
    }
  }

  if(tool === "block"){
    grid[r][c] = grid[r][c] === "X" ? "" : "X";
  }

  if(tool === "bubble"){
    grid[r][c] = grid[r][c] === "B" ? "" : "B";
  }

  if(tool === "empty"){
    grid[r][c] = "";
  }

  if(tool === "shaft"){
    const removing = grid[r][c] === "S";

    for(let dr=0;dr<3;dr++){
      for(let dc=0;dc<2;dc++){
        if(grid[r+dr] && grid[r+dr][c+dc] !== undefined){
          grid[r+dr][c+dc] = removing ? "" : "S";
        }
      }
    }
  }

  render();
}

async function pasteFromClipboard(){
  try{
    const text = await navigator.clipboard.readText();
    applyText(text);
  } catch(e){
    alert("Clipboard blocked. Copy again, tap the starting cell, then tap Paste From Clipboard.");
  }
}

function applyText(text){
  if(!text || !text.trim()) return;

  const rows = text.trim().split("\n");
  const startR = lastSelected.r;
  const startC = lastSelected.c;

  rows.forEach((row,ri)=>{
    const cols = row.split(/\t|,/);
    cols.forEach((v,ci)=>{
      const r = startR + ri;
      const c = startC + ci;

      if(!grid[r] || grid[r][c] === undefined) return;

      const val = String(v).trim();
      if(!val) return;

      if(!isNaN(val)){
        grid[r][c] = Number(val);
      } else if(val.toUpperCase() === "X"){
        grid[r][c] = "X";
      } else if(val.toUpperCase() === "B"){
        grid[r][c] = "B";
      } else if(val.toUpperCase() === "S" || val.toUpperCase() === "SHAFT"){
        for(let dr=0;dr<3;dr++){
          for(let dc=0;dc<2;dc++){
            if(grid[r+dr] && grid[r+dr][c+dc] !== undefined){
              grid[r+dr][c+dc] = "S";
            }
          }
        }
      }
    });
  });

  render();
  setReport(`Pasted from row ${startR + 1}, col ${startC + 1}.`);
}

function copyGridText(){
  const text = grid.map(row =>
    row.map(v => v === "" ? "" : String(v)).join("\t")
  ).join("\n");

  navigator.clipboard.writeText(text).then(()=>{
    setReport("Grid text copied.");
  }).catch(()=>{
    setReport("Could not copy grid text.");
  });
}

function clearBoard(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      grid[r][c] = "";
    }
  }
  render();
  setReport("Board cleared.");
}

function loadSampleGate1(){
  clearBoard();

  const sample = [
    [8,9,11,9,12,8,9],
    [10,"X",8,"X",7,11,7],
    [8,7,9,6,9,6,"X"],
    ["X",8,6,8,"B","S","S"],
    ["X",6,7,6,5,"S","S"],
    ["X",5,4,5,"X","S","S"],
    ["X",4,5,4,5,4,6],
    ["S","S",4,5,4,"X",5],
    ["S","S",3,4,3,5,4],
    ["S","S",2,"",2,4,3],
    [1,2,"","","",3,""]
  ];

  for(let r=0;r<sample.length;r++){
    for(let c=0;c<COLS;c++){
      grid[r][c] = sample[r][c] === undefined ? "" : sample[r][c];
    }
  }

  render();
  setReport("Sample Gate 1 loaded.");
}

function render(){
  document.querySelectorAll(".cell").forEach(cell=>{
    const r = Number(cell.dataset.r);
    const c = Number(cell.dataset.c);
    const val = grid[r][c];

    cell.className = "cell";
    cell.innerText = "";

    if(r === lastSelected.r && c === lastSelected.c){
      cell.classList.add("selected");
    }

    if(val === "X"){
      cell.classList.add("block");
    } else if(val === "B"){
      cell.classList.add("bubble");
      cell.innerText = "B";
    } else if(val === "S"){
      cell.classList.add("shaft");
      cell.innerText = "S";
    } else if(val !== ""){
      cell.innerText = String(val);
    }
  });
}

init();
</script>
</body>
</html>
