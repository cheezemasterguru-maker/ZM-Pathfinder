<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Pathfinder</title>

<style>
body {
  background:#0b1020;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.logo {
  width:100%;
  max-width:500px;
}

.tools {
  position:sticky;
  top:0;
  background:#0b1020;
  padding:10px;
  z-index:10;
}

button {
  margin:4px;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  max-width:500px;
  margin:auto;
  gap:2px;
}

.cell {
  background:#f0f0f0;
  color:#000;
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
.cell.block{background:#000;color:#fff;}
.cell.bubble{background:#7dd3fc;}
.cell.shaft{background:#7CFC00;}
</style>
</head>

<body>

<img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo">
<h1>ZM Pathfinder</h1>

<div class="tools">
<button onclick="setTool('number')">Number</button>
<button onclick="setTool('block')">Block</button>
<button onclick="setTool('bubble')">Bubble</button>
<button onclick="setTool('shaft')">Shaft</button>
<button onclick="setTool('empty')">Empty</button>
<br><br>
<button onclick="pasteFromClipboard()">📋 Paste From Clipboard</button>
</div>

<div id="grid" class="grid"></div>

<script>
const ROWS=20,COLS=7;
let grid=[],tool="number",start={r:0,c:0};

function init(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]="";
      const d=document.createElement("div");
      d.className="cell";
      d.dataset.r=r;
      d.dataset.c=c;

      d.onclick=()=>clickCell(r,c);

      g.appendChild(d);
    }
  }
}

function setTool(t){tool=t;}

function clickCell(r,c){
  start={r,c};

  if(tool==="number"){
    const val=prompt("Enter number:");
    if(val!==null && !isNaN(val)){
      grid[r][c]=Number(val);
    }
  }

  if(tool==="block"){
    grid[r][c]=grid[r][c]==="X"?"":"X";
  }

  if(tool==="bubble"){
    grid[r][c]=grid[r][c]==="B"?"":"B";
  }

  if(tool==="empty"){
    grid[r][c]="";
  }

  if(tool==="shaft"){
    let remove=grid[r][c]==="S";
    for(let dr=0;dr<3;dr++){
      for(let dc=0;dc<2;dc++){
        if(grid[r+dr]&&grid[r+dr][c+dc]!=null){
          grid[r+dr][c+dc]=remove?"":"S";
        }
      }
    }
  }

  render();
}

// ✅ REAL MOBILE PASTE
async function pasteFromClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    apply(text);
  }catch(e){
    alert("Clipboard blocked. Tap a cell first, then try again.");
  }
}

function apply(text){
  const rows=text.trim().split("\n");

  rows.forEach((row,ri)=>{
    const cols=row.split(/\t|,/);
    cols.forEach((v,ci)=>{
      let r=start.r+ri,c=start.c+ci;
      if(grid[r]&&grid[r][c]!=null){
        v=v.trim();
        if(!v)return;
        if(!isNaN(v))grid[r][c]=Number(v);
      }
    });
  });

  render();
}

function render(){
  document.querySelectorAll(".cell").forEach(cell=>{
    let r=cell.dataset.r,c=cell.dataset.c,val=grid[r][c];

    cell.className="cell";
    cell.innerText="";

    if(val==="X")cell.classList.add("block");
    else if(val==="B"){cell.classList.add("bubble");cell.innerText="B";}
    else if(val==="S"){cell.classList.add("shaft");cell.innerText="S";}
    else if(val!=="")cell.innerText=val;
  });
}

init();
</script>

</body>
</html>
