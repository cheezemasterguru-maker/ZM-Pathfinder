<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZM Pathfinder</title>
  <link rel="stylesheet" href="styles.css?v=112" />

  <script src="translations.js?v=5402"></script>
  <script src="help.js?v=111"></script>
  <script src="map-library.js?v=222"></script>
  <script src="map-data.js?v=2222"></script>
  <script src="map-validator.js?v=111"></script>
  <script src="objects.js?v=4444"></script>
  <script src="tile-meta.js?v=4444"></script>
  <script src="shaft-data.js?v=8181"></script>
  <script src="solver.js?v=1212"></script>
  <script src="auth.js?v=222" defer></script>
  <script src="timing-tables.js?v=111"></script>

  <script src="app-main.js?v=7777" defer></script>
  <script src="app-board.js?v=7777" defer></script>
  <script src="app-solver.js?v=5403" defer></script>
</head>
<body>
  <div id="appShell" class="app-shell locked">
    <div class="page">
      <div class="card">
        <div class="hero">
          <img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo" alt="ZM Pathfinder Logo">

          <div class="hero-title-wrap">
            <h1 id="appTitle">ZM Pathfinder</h1>

            <div class="language-picker">
              <label for="languageSelect" id="languageLabel">Language</label>
              <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
              </select>
            </div>
          </div>

          <div class="top-meta">
            <div id="loggedInBadge" class="user-badge">Not logged in</div>
            <button id="addTesterBtn" class="btn-success hidden" onclick="openAddTesterModal()">Add Beta Tester</button>
            <button id="logoutBtn" class="btn-danger hidden" onclick="logoutTester()">Logout</button>
          </div>
        </div>

        <div id="mapLoaderSection" class="hidden">
          <div class="section-title" id="mapLoaderTitle">Map Loader</div>

          <div class="map-loader-grid compact-loader">
            <div class="loader-row">
              <div class="field" id="eventTypeField">
                <label for="eventTypeSelect" id="eventTypeLabel">Event Type</label>
                <select id="eventTypeSelect" onchange="handleEventTypeChange()">
                  <option value="">Select Event Type</option>
                </select>
              </div>

              <div class="field hidden" id="eventNameField">
                <label for="eventNameSelect" id="eventNameLabel">Event Name</label>
                <select id="eventNameSelect" onchange="handleEventNameChange()">
                  <option value="">Select Event Name</option>
                </select>
              </div>
            </div>

            <div class="field hidden" id="eventMineField">
              <label for="eventMineSelect" id="eventMineLabel">Event Mine</label>
              <select id="eventMineSelect" onchange="handleEventMineChange()">
                <option value="">Select Event Mine</option>
              </select>
            </div>

            <div class="loader-row">
              <div class="field hidden" id="eventChamberField">
                <label for="eventChamberSelect" id="eventChamberLabel">Event Chamber</label>
                <select id="eventChamberSelect" onchange="handleEventChamberChange()">
                  <option value="">Select Event Chamber</option>
                </select>
              </div>

              <button id="loadMapBtn" class="btn-action hidden" onclick="loadSelectedMap()">Load Map</button>
            </div>
          </div>
        </div>

        <div class="btn-grid">
          <button id="clearBoardBtn" class="btn-action" onclick="clearBoard()">Clear Board</button>
          <button id="solveBtn" class="btn-solve" onclick="solveBoard()">Solve</button>
          <button id="downloadPngBtn" class="btn-action" onclick="downloadPNGFixed()">Download PNG</button>

          <button id="sampleGridBtn" class="btn-action" onclick="loadSampleGrid()">Sample Grid</button>
          <button id="pasteClipboardBtn" class="btn-action" onclick="pasteFromClipboard()">Paste From Clipboard</button>
          <button id="solverHelpBtn" class="btn-action" onclick="openSolverHelp()">Help</button>
          <button id="routeReportBtn" class="btn-action" onclick="openRouteReportModal()">Route Report</button>
          <button id="objectPrioritiesBtn" class="btn-action" onclick="openObjectPrioritiesModal()">Object Priorities</button>
        </div>

        <div id="report" class="report">Ready.</div>
      </div>

      <div class="card steel-showdown-card">
        <div class="steel-showdown-header">
          <img src="gear-icon.png" alt="Gears" class="steel-gear-icon steel-header-icon">
          <div class="section-title steel-showdown-title">Steel Showdown</div>
          <img src="gear-icon.png" alt="Gears" class="steel-gear-icon steel-header-icon">
        </div>

        <div class="steel-showdown-controls">
          <div class="field steel-multiplier-field">
            <label for="steelMultiplier">Multiplier</label>
            <select id="steelMultiplier" onchange="updateSteelShowdownMultiplierDisplay && updateSteelShowdownMultiplierDisplay()">
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="5">5x</option>
              <option value="10">10x</option>
            </select>
          </div>

          <div class="field steel-calc-field">
            <label>&nbsp;</label>
            <button id="steelCalculateBtn" class="btn-success steel-calc-btn" onclick="calculateSteelShowdown()">Calculate</button>
          </div>
        </div>

        <div class="steel-total-row">
          <img src="gear-icon.png" alt="Gears" class="steel-gear-icon">
          <span class="steel-total-label">Gears - </span>
          <span id="steelBaseGears" class="steel-inline-value">0</span>
          <span class="steel-total-label">x</span>
          <span id="steelMultiplierDisplay" class="steel-inline-value">1x</span>
          <span class="steel-total-label">=</span>
          <span id="steelTotalGears" class="steel-total-value">0</span>
        </div>
      </div>

      <div class="card editor-card">
        <div class="sticky-tools">
          <div class="section-title" id="editableBoardTitle" style="margin-top:0;">Editable Board</div>

          <div class="editor-meta-grid">
            <div class="field">
              <label for="titleInput" id="titleLabel">Title</label>
              <input id="titleInput" type="text" value="Gate 1" oninput="handleTitleInputChange()">
            </div>

            <div class="field">
              <label for="gateType" id="gateTypeLabel">Gate type</label>
              <select id="gateType" onchange="renderPreview()">
                <option value="standard">Standard — 5 Tiles</option>
                <option value="end">End — 3 Tiles</option>
              </select>
            </div>
          </div>

          <div class="tool-grid tool-grid-compact">
            <button id="tool-number" class="btn-white tool-active" onclick="setTool('number')">Number</button>
            <button id="tool-block" class="btn-black" onclick="setTool('block')">Block</button>
            <button id="tool-bubble" class="btn-bubble" onclick="setTool('bubble')">Bubble</button>
            <button id="tool-shaft" class="btn-shaft" onclick="setTool('shaft')">Shaft</button>

            <button type="button" class="btn-object painter-gems" onclick="setPainterObject('gems')">Gems</button>
            <button type="button" class="btn-object painter-badges" onclick="setPainterObject('badges')">Emb</button>
            <button type="button" class="btn-object painter-emblems" onclick="setPainterObject('emblems')">Badge</button>
            <button type="button" class="btn-object painter-keys" onclick="setPainterObject('keys')">Key</button>
            <button type="button" class="btn-object painter-essence" onclick="setPainterObject('essence')">ESS</button>

            <button type="button" class="btn-object painter-stickers" onclick="setPainterObject('stickers')">STK</button>
            <button type="button" class="btn-object painter-wood" onclick="setPainterObject('chest:wood')">WOOD</button>
            <button type="button" class="btn-object painter-iron" onclick="setPainterObject('chest:iron')">IRON</button>
            <button type="button" class="btn-object painter-steel" onclick="setPainterObject('chest:steel')">STEEL</button>
            <button type="button" class="btn-object painter-silver" onclick="setPainterObject('chest:silver')">SILVER</button>

            <button type="button" class="btn-object painter-gold" onclick="setPainterObject('chest:gold')">GOLD</button>
            <button id="tool-delete" class="btn-danger" onclick="setTool('delete')">Delete</button>
            <button type="button" class="btn-danger" onclick="clearAllBoardMeta()">Clear All Meta</button>
          </div>
        </div>

        <div class="grid-wrap">
          <div id="grid"></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title" id="previewTitle">Preview</div>
        <div class="preview-wrap">
          <canvas id="previewCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="loginOverlay" class="overlay show">
    <div class="modal modal-box" onclick="event.stopPropagation()">
      <h2 id="betaTesterLoginTitle">Beta Tester Login</h2>
      <div class="modal-grid">
        <div class="field">
          <input id="loginTesterId" type="text" placeholder="Enter tester ID">
        </div>
      </div>
      <div class="modal-actions">
        <button id="loginBtn" class="btn-solve" onclick="loginTester()">Login</button>
      </div>
    </div>
  </div>

  <div id="routeReportOverlay" class="overlay" onclick="closeRouteReportModal()">
    <div class="modal modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeRouteReportModal()">×</button>
      <h2 id="routeReportModalTitle">Route Report</h2>
      <div id="routeReportBody" class="help-content"></div>
      <div class="modal-actions">
        <button id="routeReportCloseBtn" class="btn-action" onclick="closeRouteReportModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="solverHelpOverlay" class="overlay" onclick="closeSolverHelp()">
    <div class="modal modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeSolverHelp()">×</button>
      <h2 id="solverHelpModalTitle">Help</h2>
      <div id="solverHelpBody" class="help-content"></div>
    </div>
  </div>

  <div id="objectPrioritiesOverlay" class="overlay" onclick="closeObjectPrioritiesModal()">
    <div class="modal modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeObjectPrioritiesModal()">×</button>
      <h2>Object Priorities</h2>

      <div id="objectPrioritiesIntro" class="help-content" style="margin-bottom: 12px;">
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
          <button
            id="standardSolverModeBtn"
            class="btn-solve"
            type="button"
            onclick="setSolverMode('standard');"
          >
            Standard Solver
          </button>

          <button
            id="customSolverModeBtn"
            class="btn-action"
            type="button"
            onclick="setSolverMode('custom');"
          >
            Custom Solver
          </button>
        </div>

        <div id="objectPrioritiesModeNote">
          Standard rules are active. Custom objective toggles are disabled.
        </div>
      </div>

      <div id="objectPrioritiesBody" class="help-content"></div>

      <div class="modal-actions">
        <button id="objectPrioritiesResetBtn" class="btn-action" onclick="resetObjectPriorities()">Reset</button>
        <button id="objectPrioritiesCloseBtn" class="btn-action" onclick="closeObjectPrioritiesModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    function downloadPNGFixed() {
      const canvas = document.getElementById("previewCanvas");
      if (!canvas) {
        alert("Preview canvas not found.");
        return;
      }

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;

      const ctx = exportCanvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
      ctx.drawImage(canvas, 0, 0);

      const link = document.createElement("a");
      const safeTitle = ((document.getElementById("titleInput")?.value || "zm-pathfinder")
        .trim()
        .replace(/[^\w\- ]+/g, "")
        .replace(/\s+/g, "_"));

      link.download = `${safeTitle || "zm-pathfinder"}.png`;
      link.href = exportCanvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
