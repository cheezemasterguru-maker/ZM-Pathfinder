<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZM Pathfinder</title>

<style>
:root {
  --bg: #0b1020;
  --card: #151c34;
  --text: #e8ecff;
  --accent: #3b5cff;
  --cyan: #7dd3fc;
  --neon: #7CFC00;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

.logo {
  width: 100%;
  max-width: 500px;
  margin: 10px auto;
  display: block;
}

h1 {
  margin: 5px 0 15px;
}

.container {
  padding: 10px;
}

.tools {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 10px;
  z-index: 10;
}

button {
  margin: 5px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-number { background: #fff; color: #000; }
.btn-block { background: #000; color: #fff; }
.btn-bubble { background: var(--cyan); }
.btn-shaft { background: var(--neon); }
.btn-empty { background: #ccc; }

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin: 10px auto;
  max-width: 500px;
}

.cell {
  background: #ddd;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  user-select: none;
}

.block { background: #000; color: #fff; }
.bubble { background: var(--cyan); }
.shaft { background: var(--neon); }
</style>
</head>

<body>

<img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo"/>

<h1>ZM Pathfinder</h1>

<div class="container">

<div class="tools">
  <button class="btn-number" onclick="setTool('number')">Number</button>
  <button class="btn-block" onclick="setTool('block')">Block</button>
  <button class="btn-bubble" onclick="setTool('bubble')">Bubble</button>
  <button class="btn-shaft" onclick="setTool('shaft')">Shaft 2x3</button>
  <button class="btn-empty" onclick="setTool('empty')">Empty</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const ROWS = 20;
const COLS = 7;

let grid = [];
let tool = "number";
let selectedCell = null;

// BUILD GRID
function initGrid() {
  const container = document.getElementById("grid");
  container.innerHTML = "";

  grid = [];

  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];

    for (let c = 0; c < COLS; c++) {
      grid[r][c] = "";

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.r = r;
      cell.dataset.c = c;

      cell.onclick = () => handleCellClick(r, c);
      cell.onpaste = (e) => handlePaste(e, r, c);

      container.appendChild(cell);
    }
  }
}

// TOOL SELECT
function setTool(t) {
  tool = t;
}

// CLICK CELL
function handleCellClick(r, c) {
  selectedCell = { r, c };

  if (tool === "block") {
    grid[r][c] = grid[r][c] === "X" ? "" : "X";
  }
  else if (tool === "bubble") {
    grid[r][c] = grid[r][c] === "B" ? "" : "B";
  }
  else if (tool === "empty") {
    grid[r][c] = "";
  }
  else if (tool === "shaft") {
    for (let dr = 0; dr < 3; dr++) {
      for (let dc = 0; dc < 2; dc++) {
        if (grid[r+dr] && grid[r+dr][c+dc] !== undefined) {
          grid[r+dr][c+dc] = "S";
        }
      }
    }
  }

  render();
}

// PASTE DIRECTLY INTO GRID
function handlePaste(e, startR, startC) {
  e.preventDefault();

  const text = e.clipboardData.getData("text");
  const rows = text.trim().split("\n");

  rows.forEach((row, rIndex) => {
    const cols = row.split(/\t|,/);

    cols.forEach((val, cIndex) => {
      const r = startR + rIndex;
      const c = startC + cIndex;

      if (grid[r] && grid[r][c] !== undefined) {
        const v = val.trim();

        if (!v) return;

        if (!isNaN(v)) grid[r][c] = Number(v);
        else if (v.toUpperCase() === "B") grid[r][c] = "B";
        else if (v.toUpperCase() === "X") grid[r][c] = "X";
      }
    });
  });

  render();
}

// RENDER GRID
function render() {
  const cells = document.querySelectorAll(".cell");

  cells.forEach(cell => {
    const r = cell.dataset.r;
    const c = cell.dataset.c;

    const val = grid[r][c];

    cell.className = "cell";
    cell.textContent = "";

    if (val === "X") {
      cell.classList.add("block");
    } else if (val === "B") {
      cell.classList.add("bubble");
      cell.textContent = "B";
    } else if (val === "S") {
      cell.classList.add("shaft");
      cell.textContent = "S";
    } else if (val !== "") {
      cell.textContent = val;
    }
  });
}

// INIT
initGrid();
</script>

</body>
</html>
