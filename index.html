<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM Pathfinder</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:10px;
}

.logo{
  width:100%;
  max-width:320px;
  margin:auto;
  display:block;
}

h1{
  margin:5px 0 10px;
  font-size:26px;
}

select{
  width:100%;
  padding:8px;
  font-size:14px;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  margin:4px;
  padding:10px 12px;
  font-size:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.number{background:#fff;color:#000;}
.block{background:#000;color:#fff;}
.bubble{background:#8fd3f7;color:#000;}
.shaft{background:#98f44d;color:#000;}
.empty{background:#ccc;color:#000;}
.action{background:#2a3560;color:#fff;}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  margin-top:10px;
}

.cell{
  background:#eee;
  color:#111;
  aspect-ratio:1;
  font-size:16px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

.selected{
  outline:3px solid orange;
}

.blockCell{background:#000;color:#fff;}
.bubbleCell{background:#8fd3f7;}
.shaftCell{background:#98f44d;}
</style>
</head>

<body>
<div class="wrap">

<img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo">
<h1>ZM Pathfinder</h1>

<select>
<option>Standard — 5 attack points</option>
<option>End — 3 attack points</option>
</select>

<div>
<button class="number" onclick="setTool('number')">Number</button>
<button class="block" onclick="setTool('block')">Block</button>
<button class="bubble" onclick="setTool('bubble')">Bubble</button>
<button class="shaft" onclick="setTool('shaft')">Shaft 2x3</button>
<button class="empty" onclick="setTool('empty')">Empty</button>
</div>

<div>
<button class="action" onclick="pasteClipboard()">📋 Paste From Clipboard</button>
<button class="action" onclick="copyGrid()">Copy Grid</button>
<button class="action" onclick="clearGrid()">Clear</button>
<button class="action" onclick="sample()">Sample</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const ROWS=20, COLS=7;
let grid=[], tool="number";
let selected={r:0,c:0};

function init(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[];

  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]="";

      const d=document.createElement("div");
      d.className="cell";
      d.onclick=()=>clickCell(r,c);
      d.dataset.r=r;
      d.dataset.c=c;

      g.appendChild(d);
    }
  }
  render();
}

function setTool(t){tool=t;}

function clickCell(r,c){
  selected={r,c};

  if(tool==="number"){
    let val=prompt("Number:");
    if(val!==null){
      grid[r][c]=val===""?"":Number(val);
    }
  }

  if(tool==="block"){
    grid[r][c]=grid[r][c]==="X"?"":"X";
  }

  if(tool==="bubble"){
    grid[r][c]=grid[r][c]==="B"?"":"B";
  }

  if(tool==="empty"){
    grid[r][c]="";
  }

  if(tool==="shaft"){
    let removing=grid[r][c]==="S";
    for(let dr=0;dr<3;dr++){
      for(let dc=0;dc<2;dc++){
        if(grid[r+dr] && grid[r+dr][c+dc]!==undefined){
          grid[r+dr][c+dc]=removing?"":"S";
        }
      }
    }
  }

  render();
}

async function pasteClipboard(){
  let text=await navigator.clipboard.readText();
  let rows=text.split("\n");

  rows.forEach((row,i)=>{
    let cols=row.split(/\t|,/);
    cols.forEach((v,j)=>{
      let r=selected.r+i;
      let c=selected.c+j;

      if(grid[r] && grid[r][c]!==undefined){
        let val=v.trim();
        if(!val)return;

        if(!isNaN(val)) grid[r][c]=Number(val);
        else if(val==="X") grid[r][c]="X";
        else if(val==="B") grid[r][c]="B";
      }
    });
  });

  render();
}

function copyGrid(){
  let txt=grid.map(r=>r.join("\t")).join("\n");
  navigator.clipboard.writeText(txt);
}

function clearGrid(){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      grid[r][c]="";
  render();
}

function sample(){
  clearGrid();
  grid[0]=[8,9,11,9,12,8,9];
  grid[1]=[10,"X",8,"X",7,11,7];
  render();
}

function render(){
  document.querySelectorAll(".cell").forEach(cell=>{
    let r=cell.dataset.r;
    let c=cell.dataset.c;
    let val=grid[r][c];

    cell.className="cell";
    cell.innerText="";

    if(r==selected.r && c==selected.c)
      cell.classList.add("selected");

    if(val==="X") cell.classList.add("blockCell");
    else if(val==="B"){cell.classList.add("bubbleCell");cell.innerText="B";}
    else if(val==="S"){cell.classList.add("shaftCell");cell.innerText="S";}
    else if(val!=="") cell.innerText=val;
  });
}

init();
</script>
</body>
</html>
