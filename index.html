<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZM Pathfinder</title>
  <link rel="stylesheet" href="styles.css?v=111" />

  <script src="translations.js?v=1"></script>
  <script src="help.js?v=111"></script>
  <script src="map-library.js?v=222"></script>
  <script src="map-data.js?v=444"></script>
  <script src="map-validator.js?v=111"></script>
  <script src="objects.js?v=4444"></script>
  <script src="tile-meta.js?v=4444"></script>
  <script src="shaft-data.js?v=333"></script>
  <script src="solver.js?v=8888"></script>
  <script src="auth.js?v=222" defer></script>
  <script src="timing-tables.js?v=111"></script>

  <script src="app-main.js?v=5402" defer></script>
  <script src="app-board.js?v=7766" defer></script>
  <script src="app-solver.js?v=5402" defer></script>
</head>
<body>
  <div id="appShell" class="app-shell locked">
    <div class="page">
      <div class="card">
        <div class="hero">
          <img src="file_00000000e35071fda5e92d9996ac3621.png" class="logo" alt="ZM Pathfinder Logo">

          <div class="hero-title-wrap">
            <h1 id="appTitle">ZM Pathfinder</h1>

            <div class="language-picker">
              <label for="languageSelect" id="languageLabel">Language</label>
              <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
              </select>
            </div>
          </div>

          <div class="top-meta">
            <div id="loggedInBadge" class="user-badge">Not logged in</div>
            <button id="addTesterBtn" class="btn-success hidden" onclick="openAddTesterModal()">Add Beta Tester</button>
            <button id="logoutBtn" class="btn-danger hidden" onclick="logoutTester()">Logout</button>
          </div>
        </div>

        <div class="section-title" id="howInputGridTitle">How the input grid works</div>
        <div id="shortHelpText" class="help"></div>

        <div class="controls-grid">
          <div class="field">
            <label for="titleInput" id="titleLabel">Title</label>
            <input id="titleInput" type="text" value="Gate 1" oninput="handleTitleInputChange()">
          </div>

          <div class="field">
            <label for="gateType" id="gateTypeLabel">Gate type</label>
            <select id="gateType" onchange="renderPreview()">
              <option value="standard">Standard — 5 attack points</option>
              <option value="end">End — 3 attack points</option>
            </select>
          </div>
        </div>

        <div id="mapLoaderSection" class="hidden">
          <div class="section-title" id="mapLoaderTitle">Map Loader</div>

          <div class="map-loader-grid compact-loader">
            <div class="loader-row">
              <div class="field" id="eventTypeField">
                <label for="eventTypeSelect" id="eventTypeLabel">Event Type</label>
                <select id="eventTypeSelect" onchange="handleEventTypeChange()">
                  <option value="">Select Event Type</option>
                </select>
              </div>

              <div class="field hidden" id="eventNameField">
                <label for="eventNameSelect" id="eventNameLabel">Event Name</label>
                <select id="eventNameSelect" onchange="handleEventNameChange()">
                  <option value="">Select Event Name</option>
                </select>
              </div>
            </div>

            <div class="field hidden" id="eventMineField">
              <label for="eventMineSelect" id="eventMineLabel">Event Mine</label>
              <select id="eventMineSelect" onchange="handleEventMineChange()">
                <option value="">Select Event Mine</option>
              </select>
            </div>

            <div class="loader-row">
              <div class="field hidden" id="eventChamberField">
                <label for="eventChamberSelect" id="eventChamberLabel">Event Chamber</label>
                <select id="eventChamberSelect" onchange="handleEventChamberChange()">
                  <option value="">Select Event Chamber</option>
                </select>
              </div>

              <button id="loadMapBtn" class="btn-action hidden" onclick="loadSelectedMap()">Load Map</button>
            </div>
          </div>
        </div>

        <div class="btn-grid">
          <button id="clearBoardBtn" class="btn-action" onclick="clearBoard()">Clear Board</button>
          <button id="solveBtn" class="btn-solve" onclick="solveBoard()">Solve</button>
          <button id="downloadPngBtn" class="btn-action" onclick="downloadPNGFixed()">Download PNG</button>

          <button id="sampleGridBtn" class="btn-action" onclick="loadSampleGrid()">Sample Grid</button>
          <button id="pasteClipboardBtn" class="btn-action" onclick="pasteFromClipboard()">Paste From Clipboard</button>
          <button id="solverHelpBtn" class="btn-action" onclick="openSolverHelp()">Solver Help</button>
          <button id="routeReportBtn" class="btn-action" onclick="openRouteReportModal()">Route Report</button>
          <button id="objectPrioritiesBtn" class="btn-action" onclick="openObjectPrioritiesModal()">Object Priorities</button>
        </div>

        <div id="report" class="report">Ready. Grid and solver are wired together.</div>
      </div>

      <div class="card editor-card">
        <div class="sticky-tools">
          <div class="section-title" id="editableBoardTitle" style="margin-top:0;">Editable Board</div>

          <div class="tool-grid">
            <button id="tool-number" class="btn-white tool-active" onclick="setTool('number')">Number</button>
            <button id="tool-block" class="btn-black" onclick="setTool('block')">Block</button>
            <button id="tool-bubble" class="btn-bubble" onclick="setTool('bubble')">Bubble</button>
            <button id="tool-shaft" class="btn-shaft" onclick="setTool('shaft')">Shaft</button>
          </div>
        </div>

        <div class="grid-wrap">
          <div id="grid"></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title" id="previewTitle">Preview</div>
        <div class="preview-wrap">
          <canvas id="previewCanvas" width="700" height="1200"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="loginOverlay" class="overlay show">
    <div class="modal modal-box" onclick="event.stopPropagation()">
      <h2 id="betaTesterLoginTitle">Beta Tester Login</h2>
      <div class="modal-grid">
        <div class="field">
          <input id="loginTesterId" type="text" placeholder="Enter tester ID">
        </div>
      </div>
      <div class="modal-actions">
        <button id="loginBtn" class="btn-solve" onclick="loginTester()">Login</button>
      </div>
    </div>
  </div>

  <script>
    function downloadPNGFixed() {
      const canvas = document.getElementById("previewCanvas");

      if (!canvas || canvas.width === 0 || canvas.height === 0) {
        alert("Nothing to export.");
        return;
      }

      const link = document.createElement("a");
      link.download = "zm-pathfinder.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
