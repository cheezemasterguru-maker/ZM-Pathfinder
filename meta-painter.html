<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZM Meta Painter</title>
  <link rel="stylesheet" href="styles.css?v=111" />
  <script src="map-library.js?v=111"></script>
  <script src="map-data.js?v=222"></script>
  <script src="objects.js?v=111"></script>
  <script src="tile-meta.js?v=111"></script>
  <script src="meta-painter.js?v=333" defer></script>
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0d1220;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #121a2d;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1, h2 {
      margin: 0 0 12px 0;
    }

    p {
      margin: 0;
    }

    .hidden {
      display: none !important;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .field select,
    .field input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #0b1020;
      color: #fff;
      padding: 10px;
      font-size: 14px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-action { background: #3b82f6; color: #fff; }
    .btn-good { background: #16a34a; color: #fff; }
    .btn-warn { background: #dc2626; color: #fff; }
    .btn-neutral { background: #475569; color: #fff; }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #dbeafe;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .board-wrap {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
    }

    .meta-grid {
      display: grid;
      gap: 4px;
      width: fit-content;
      margin-top: 8px;
      min-width: max-content;
    }

    .meta-cell {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      color: #111;
      font-weight: 700;
      background: #e5e7eb;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      text-align: center;
      overflow: hidden;
    }

    .meta-cell.paintable {
      cursor: pointer;
    }

    .meta-cell.blocked {
      background: #000;
      color: #fff;
    }

    .meta-cell.bubble {
      background: #8fd3f7;
      color: #111;
    }

    .meta-cell.shaft {
      background: #98f44d;
      color: #111;
    }

    .meta-cell .base-number {
      font-size: 15px;
      line-height: 1;
    }

    .meta-cell .base-type {
      font-size: 7px;
      line-height: 1;
      margin-top: 2px;
    }

    .legend-note {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.4;
    }

    .output-box {
      min-height: 320px;
      font-family: monospace;
      white-space: pre;
      resize: vertical;
    }

    .tools-sticky-card {
      position: sticky;
      top: 8px;
      z-index: 50;
      background: #121a2d;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tool-btn {
      min-height: 42px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.08);
      color: #111;
      font-weight: 700;
      padding: 6px 8px;
      text-align: center;
      box-sizing: border-box;
      font-size: 13px;
      line-height: 1.1;
    }

    .tool-btn.active {
      box-shadow: 0 0 0 3px #fff inset;
    }

    .tool-btn.plain {
      background: #e5e7eb;
      color: #111;
    }

    .tool-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .tool-actions button {
      padding: 8px 10px;
      font-size: 13px;
      min-height: 40px;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 12px;
        border-radius: 16px;
      }

      .controls-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .tools-sticky-card {
        top: 6px;
      }

      .tool-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .tool-btn {
        min-height: 38px;
        padding: 4px 5px;
        font-size: 11px;
        border-radius: 10px;
      }

      .tool-actions {
        gap: 6px;
      }

      .tool-actions button {
        font-size: 12px;
        min-height: 36px;
        padding: 7px 8px;
      }

      .meta-cell {
        width: 38px;
        height: 38px;
      }

      .meta-cell .base-number {
        font-size: 14px;
      }

      .meta-cell .base-type {
        font-size: 6px;
      }

      .btn-row button {
        font-size: 13px;
        padding: 9px 11px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <div class="title-row">
        <div>
          <h1>ZM Meta Painter</h1>
          <div class="legend-note">Tap a tool, then tap numbered tiles to assign metadata. Block, Bubble, and Shaft tiles are view-only.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="controls-grid">
        <div class="field">
          <label for="eventTypeSelect">Event Type</label>
          <select id="eventTypeSelect" onchange="mpHandleEventTypeChange()">
            <option value="">Select Event Type</option>
          </select>
        </div>

        <div class="field">
          <label for="eventNameSelect">Event Name</label>
          <select id="eventNameSelect" onchange="mpHandleEventNameChange()">
            <option value="">Select Event Name</option>
          </select>
        </div>

        <div class="field hidden" id="eventMineField">
          <label for="eventMineSelect">Event Mine</label>
          <select id="eventMineSelect" onchange="mpHandleEventMineChange()">
            <option value="">Select Event Mine</option>
          </select>
        </div>

        <div class="field">
          <label for="eventChamberSelect">Chamber</label>
          <select id="eventChamberSelect" onchange="mpHandleEventChamberChange()">
            <option value="">Select Chamber</option>
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-action" onclick="mpLoadSelectedChamber()">Load Chamber</button>
        <button class="btn-good" onclick="mpGenerateOutput()">Generate Output</button>
        <button class="btn-good" onclick="mpCopyOutput()">Copy Output</button>
        <button class="btn-action" onclick="mpDownloadOutput()">Download Output</button>
      </div>

      <div id="metaPainterStatus" class="status"></div>
    </div>

    <div class="card tools-sticky-card">
      <h2>Tools</h2>

      <div class="tool-grid" id="toolGrid"></div>

      <div class="tool-actions">
        <button class="btn-neutral" type="button" onclick="mpUndoLastAction()">Undo</button>
        <button class="btn-neutral" type="button" onclick="mpSetTool('plain')">Plain</button>
        <button class="btn-neutral" type="button" onclick="mpSetTool('clear')">Clear</button>
        <button class="btn-warn" type="button" onclick="mpClearCurrentMetadata()">Clear Chamber Meta</button>
      </div>
    </div>

    <div class="card">
      <h2>Painter</h2>
      <div class="board-wrap">
        <div id="metaGrid" class="meta-grid"></div>
      </div>
    </div>

    <div class="card">
      <h2>Output</h2>
      <textarea id="outputBox" class="output-box" spellcheck="false"></textarea>
    </div>
  </div>
</body>
</html>
